<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
	xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	layout:decorate="plantilla/plantillaui">

<head>
<meta charset="UTF-8">
<title>Productos</title>
</head>

<body>

	<div layout:fragment="contenidopaginas">

		<section class="section">
			<div class="container-fluid">

				<div class="container mt-5">

					<div class="card shadow">

						<div class="card-header bg-primary text-white">
							<h3 class="mb-0 text-center text-white">Nuevo Producto</h3>
						</div>

						<div class="card-body">

							<form th:action="@{/producto/guardar}" th:object="${producto}"
								method="post" enctype="multipart/form-data">

								<div class="row">

									<!-- Nombre -->
									<div class="col-md-6 mb-3">

										<label for="nombre" class="form-label"> Nombre del
											producto </label> <input type="text" id="nombre" class="form-control"
											th:field="*{nombre}"
											placeholder="Ingrese el nombre del producto" required>

									</div>

									<!-- Categoría -->
									<div class="col-md-6 mb-3">

										<label for="idCategoria" class="form-label"> Categoría
										</label> <select class="form-select" th:field="*{categoria}" required>

											<option value="">Seleccione una categoría</option>

											<option th:each="categoriaItem : ${categorias}"
												th:value="${categoriaItem.idCategoria}"
												th:text="${categoriaItem.nombre}">Categoría</option>

										</select>

									</div>

								</div>

								<div class="row">

									<!-- Precio -->
									<div class="col-md-6 mb-3">

										<label for="precio" class="form-label"> Precio </label> <input
											type="number" id="precio" class="form-control"
											th:field="*{precio}" step="0.01" min="0.01"
											placeholder="0.00" required>

									</div>

									<!-- Stock -->
									<div class="col-md-6 mb-3">

										<label for="stock" class="form-label"> Stock </label> <input
											type="number" id="stock" class="form-control"
											th:field="*{stock}" min="0" placeholder="0" required>

									</div>

								</div>

								<!-- Descripción -->
								<div class="mb-3">

									<label for="descripcion" class="form-label">
										Descripción </label>

									<textarea id="descripcion" class="form-control" rows="4"
										th:field="*{descripcion}"
										placeholder="Ingrese una descripción" required></textarea>

								</div>

								<!-- Imagen -->
								<div class="mb-3">

									<label class="form-label"> Imagen del producto </label> <input
										type="file" class="form-control" name="imagen"
										accept="image/png,image/jpeg,image/jpg" required> <small
										class="text-muted"> Formatos permitidos: JPG, JPEG y
										PNG. </small>

								</div>

								<hr>

								<div class="d-flex justify-content-end gap-2">

									<a th:href="@{/producto}" class="btn btn-secondary">
										Cancelar </a>

									<button type="reset" class="btn btn-warning">Limpiar</button>

									<button type="submit" class="btn btn-primary">Guardar
										producto</button>

								</div>

							</form>

						</div>

					</div>

				</div>

			</div>
		</section>

	</div>

</body>
</html>
