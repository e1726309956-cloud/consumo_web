<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="/plantilla/plantillaui">

<head>
    <meta charset="UTF-8"/>
    <title>Crear Pedido</title>
</head>

<body>
<div layout:fragment="contenidopaginas">
    <h5 class="card-title fw-semibold mb-4">Crear Pedido</h5>

    <form th:action="@{/pedidos/guardar}" th:object="${pedidos}" method="post">

        <div class="mb-3">
            <label for="fechaPedido" class="form-label">Fecha Pedido</label>
            <input type="date" class="form-control" th:field="*{fechaPedido}" id="fechaPedido">
        </div>

        <div class="mb-3">
            <label for="fechaEntrega" class="form-label">Fecha Entrega</label>
            <input type="date" class="form-control" th:field="*{fechaEntrega}" id="fechaEntrega">
        </div>

        <div class="mb-3">
            <label for="direccionEntrega" class="form-label">Dirección Entrega</label>
            <input type="text" class="form-control" th:field="*{direccionEntrega}" id="direccionEntrega">
        </div>

        <div class="mb-3">
            <label for="observacion" class="form-label">Observación</label>
            <textarea class="form-control" th:field="*{observacion}" id="observacion"></textarea>
        </div>

        <div class="mb-3">
            <label for="total" class="form-label">Total</label>
            <input type="number" step="0.01" class="form-control" th:field="*{total}" id="total">
        </div>

        <div class="mb-3">
            <label for="idEstado" class="form-label">Estado</label>
            <input type="number" class="form-control" th:field="*{idEstado}" id="idEstado">
        </div>

        <div class="mb-3">
            <label for="idUsuario" class="form-label">Usuario</label>
            <input type="number" class="form-control" th:field="*{idUsuario}" id="idUsuario">
        </div>

        <button type="submit" class="btn btn-primary">Guardar</button>
    </form>
</div>
</body>
</html>
