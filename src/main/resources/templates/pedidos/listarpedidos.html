<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" 
xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
layout:decorate="/plantilla/plantillaui">

  <head>
    <meta charset="UTF-8" />
  </head>
  <body>
  					<div layout:fragment="contenidopaginas">
						<h5 class="card-title fw-semibold mb-4">Listar Pedidos</h5>
						<table class="table">
							<thead>
								<tr>
									<th scope="col">idPedido</th>
									<th scope="col">fechaPedido</th>
									<th scope="col">fechaEntrega</th>
									<th scope="col">direccionEntrega</th>
									<th scope="col">observacion</th>
									<th scope="col">total</th>
									<th scope="col"></th>
								</tr>
							</thead>
							<tbody>
								<tr th:each="indice : ${listapedido}">
								<td th:text="${indice.idPedido}"></td>
								<td th:text="${indice.fechaPedido}"></td>
								<td th:text="${indice.fechaEntrega}"></td>
								<td th:text="${indice.direccionEntrega}"></td>
								<td th:text="${indice.observacion}"></td>
								<td th:text="${indice.total}"></td>
								<td>
								<a  href="" class="btn btn-primary" title="Editar"><i class="ti-pencil-alt"></i></a>
								<a  href="" class="btn btn-danger" title="Eliminar"><i class="ti-trash"></i></a>
								</td>

								</tr>
							
							</tbody>
						</table>
					</div>
  </body>
</html>
